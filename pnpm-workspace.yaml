packages:
  - 'apps/*'
  - 'packages/*'
allowBuilds:
  '@firebase/util': true
  '@nestjs/core': true
  '@scarf/scarf': true
  esbuild: true
  msw: true
  protobufjs: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - esbuild@0.25.0
  - '@tootallnate/once@3.0.1'
  - postcss@8.5.10
  - ws@8.20.1
overrides:
  '@tootallnate/once@<3.0.1': ^3.0.1
  esbuild@<=0.24.2: ^0.25.0
  postcss@<8.5.10: ^8.5.10
  ws@>=8.0.0 <8.20.1: ^8.20.1
