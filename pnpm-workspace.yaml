packages:
  - 'apps/*'
  - 'packages/*'
nodeLinker: hoisted
allowBuilds:
  '@firebase/util': true
  '@nestjs/core': true
  '@scarf/scarf': true
  '@sentry/cli': true
  core-js: false
  esbuild: true
  msw: true
  protobufjs: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - esbuild@0.25.0
  - esbuild@0.28.1
  - '@tootallnate/once@3.0.1'
  - postcss@8.5.10
  - ws@8.21.0
overrides:
  '@babel/core@<=7.29.0': ^7.29.1
  '@grpc/grpc-js@<1.14.4': ^1.14.4
  '@opentelemetry/core@<2.8.0': ^2.8.0
  '@tootallnate/once@<3.0.1': ^3.0.1
  dompurify@<=3.4.10: ^3.4.11
  esbuild@>=0.17.0 <0.28.1: ^0.28.1
  form-data@<2.5.6: 2.5.6
  form-data@>=4.0.0 <4.0.6: 4.0.6
  hono@<4.12.25: 4.12.25
  js-yaml@<=4.1.1: 4.2.0
  multer@>=1.0.0 <2.2.0: 2.2.0
  postcss@<8.5.10: ^8.5.10
  protobufjs@<=7.6.2: 7.6.3
  'shell-quote@>=1.1.0 <=1.8.3': 1.8.4
  tar@<=7.5.15: 7.5.16
  undici@>=6.0.0 <6.27.0: 6.27.0
  undici@>=8.0.0 <8.5.0: 8.5.0
  uuid@<11.1.1: 11.1.1
  ws@>=7.0.0 <7.5.11: 7.5.11
  ws@>=8.0.0 <8.21.0: ^8.21.0
