name: CD Package Mobile

on:
  workflow_call:
    secrets:
      EXPO_TOKEN:
        required: true
      SENTRY_AUTH_TOKEN:
        required: false

permissions:
  contents: write

jobs:
  publish-mobile:
    name: Package Mobile (EAS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Environment
        uses: ./.github/actions/setup-environment

      - name: Setup Expo
        uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e # v8
        with:
          eas-version: 18.13.0
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Package (Local Android Build)
        working-directory: apps/mobile
        run: eas build --platform android --profile production --local --non-interactive --output build.apk
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ vars.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_APP_ENV: production
          EXPO_PUBLIC_APP_VERSION: ${{ vars.APP_VERSION || '1.0.0' }}
          EXPO_PUBLIC_COMMIT_SHA: ${{ github.sha }}
          EXPO_PUBLIC_SENTRY_ENVIRONMENT: production
          EXPO_PUBLIC_SENTRY_RELEASE: sha-${{ github.sha }}
          EXPO_PUBLIC_SENTRY_TRACES_SAMPLE_RATE: ${{ vars.EXPO_PUBLIC_SENTRY_TRACES_SAMPLE_RATE || '0.1' }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_MOBILE_PROJECT }}

      - name: Upload Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mobile-production-build
          path: apps/mobile/build.apk

      - name: Publish to GitHub Releases
        working-directory: apps/mobile
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHORT_SHA: ${{ github.sha }}
        run: |
          APK_NAME="uitfood-prod-${SHORT_SHA}.apk"
          cp build.apk "$APK_NAME"
          if gh release view prod-latest >/dev/null 2>&1; then
            gh release delete prod-latest --yes --cleanup-tag
          fi
          gh release create prod-latest "$APK_NAME" \
            --title "Production Build (Latest)" \
            --notes "Built from commit \`${SHORT_SHA}\`" \
            --prerelease \
            --target "${SHORT_SHA}"
