name: API CI/CD Pipeline

on:
  push:
    branches: [master]
    paths:
      - 'apps/services/**'
      - 'apps/gateway/**'
      - 'packages/contracts/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate API
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/food_order_db
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg18-trixie
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: food_order_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Code (Checkout)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Environment
        uses: ./.github/actions/setup-environment

      - name: Turbo Cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-api-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-api-
            ${{ runner.os }}-turbo-

      - name: Check (Lint & Typecheck)
        run: pnpm turbo run lint typecheck --filter="./apps/services/*" --filter="gateway" --cache-dir=".turbo"
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Security Scan (Audit)
        run: pnpm audit --audit-level high

      - name: Unit Test
        run: pnpm turbo run test --filter="./apps/services/*" --filter="gateway" --cache-dir=".turbo"
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          VNPAY_TMN_CODE: ${{ secrets.VNPAY_TMN_CODE }}
          VNPAY_HASH_SECRET: ${{ secrets.VNPAY_HASH_SECRET }}
          VNPAY_URL: ${{ secrets.VNPAY_URL }}
          VNPAY_RETURN_URL: ${{ secrets.VNPAY_RETURN_URL }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

      - name: Build
        run: pnpm turbo run build --filter="./apps/services/*" --filter="gateway" --cache-dir=".turbo"
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}



  publish:
    name: Publish Docker Images
    needs: validate
    strategy:
      matrix:
        include:
          - app: catalog
            path: apps/services/catalog/Dockerfile
          - app: gateway
            path: apps/gateway/Dockerfile
          - app: identity
            path: apps/services/identity/Dockerfile
          - app: media
            path: apps/services/media/Dockerfile
          - app: notification
            path: apps/services/notification/Dockerfile
          - app: ordering
            path: apps/services/ordering/Dockerfile
          - app: payment
            path: apps/services/payment/Dockerfile
          - app: promotion
            path: apps/services/promotion/Dockerfile
          - app: reporting
            path: apps/services/reporting/Dockerfile
          - app: review
            path: apps/services/review/Dockerfile
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/cd-package-docker.yml
    with:
      app: ${{ matrix.app }}
      dockerfile_path: ${{ matrix.path }}
      gh_actor: ${{ github.actor }}
      gh_repository: ${{ github.repository }}
    secrets: inherit
