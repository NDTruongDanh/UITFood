name: Main CI/CD Pipeline

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    uses: ./.github/workflows/ci-validate.yml
    secrets: inherit

  publish-api-docker:
    name: Publish API Docker Image
    needs: validate
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/cd-package-docker.yml
    with:
      app: api
      gh_actor: ${{ github.actor }}
      gh_repository: ${{ github.repository }}
    secrets: inherit

  publish-web-docker:
    name: Publish Web Docker Image
    needs: validate
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/cd-package-docker.yml
    with:
      app: web
      gh_actor: ${{ github.actor }}
      gh_repository: ${{ github.repository }}
      vite_api_base_url: ${{ vars.VITE_API_BASE_URL }}
    secrets: inherit

  deploy-api-render:
    name: Deploy API Image to Render
    needs: publish-api-docker
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
    uses: ./.github/workflows/cd-deploy-render.yml
    with:
      app: api
      gh_repository: ${{ github.repository }}
      image_url: ${{ needs.publish-api-docker.outputs.image_url }}
      image_tag: ${{ needs.publish-api-docker.outputs.image_tag }}
    secrets:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_API_DEPLOY_HOOK }}

  deploy-web-render:
    name: Deploy Web Image to Render
    needs: publish-web-docker
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
    uses: ./.github/workflows/cd-deploy-render.yml
    with:
      app: web
      gh_repository: ${{ github.repository }}
      image_url: ${{ needs.publish-web-docker.outputs.image_url }}
      image_tag: ${{ needs.publish-web-docker.outputs.image_tag }}
    secrets:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_WEB_DEPLOY_HOOK }}

  publish-mobile:
    needs: validate
    uses: ./.github/workflows/cd-package-mobile.yml
    secrets:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
