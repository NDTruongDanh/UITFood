name: Identity CI/CD Pipeline

on:
  push:
    branches: [master]
    paths:
      - 'apps/services/identity/**'
      - 'packages/contracts/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate Identity
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://identity:identity@localhost:5432/identity
      BETTER_AUTH_SECRET: a_very_long_secret_for_test_purposes_only_32_chars
      BETTER_AUTH_URL: http://localhost:8080
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: identity
          POSTGRES_PASSWORD: identity
          POSTGRES_DB: identity
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Code (Checkout)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Environment
        uses: ./.github/actions/setup-environment

      - name: Check (Lint & Typecheck)
        run: pnpm turbo run lint typecheck --filter=identity

      - name: Unit Test
        run: pnpm --filter=identity run test

      - name: Build
        run: pnpm turbo run build --filter=identity

      - name: Migrate Identity Database
        run: pnpm --filter=identity run db:migrate

  publish:
    name: Publish Identity Docker Image
    needs: validate
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/cd-package-docker.yml
    with:
      app: identity
      dockerfile_path: apps/services/identity/Dockerfile
      gh_actor: ${{ github.actor }}
      gh_repository: ${{ github.repository }}
    secrets: inherit

  deploy-render:
    name: Deploy Identity Image to Render
    needs: publish
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
    uses: ./.github/workflows/cd-render-image.yml
    with:
      app: identity
      gh_repository: ${{ github.repository }}
    secrets:
      RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_IDENTITY_DEPLOY_HOOK }}
