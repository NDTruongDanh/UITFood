name: Media CI/CD Pipeline

on:
  push:
    branches: [master]
    paths:
      - 'apps/services/media/**'
      - 'packages/contracts/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate Media
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://media:media@localhost:5432/media
      CLOUDINARY_CLOUD_NAME: test-cloud
      CLOUDINARY_API_KEY: test-key
      CLOUDINARY_API_SECRET: test-secret
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: media
          POSTGRES_PASSWORD: media
          POSTGRES_DB: media
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Code (Checkout)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Environment
        uses: ./.github/actions/setup-environment

      - name: Check (Lint & Typecheck)
        run: pnpm turbo run lint typecheck --filter=media

      - name: Unit Test
        run: pnpm --filter=media run test

      - name: Build
        run: pnpm turbo run build --filter=media

      - name: Migrate Media Database
        run: pnpm --filter=media run db:migrate

      - name: Test (TCP + Postgres E2E)
        run: pnpm --filter=media run test:e2e

  publish:
    name: Publish Media Docker Image
    needs: validate
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/cd-package-docker.yml
    with:
      app: media
      dockerfile_path: apps/services/media/Dockerfile
      gh_actor: ${{ github.actor }}
      gh_repository: ${{ github.repository }}
    secrets: inherit

  deploy-render:
    name: Deploy Media Image to Render
    needs: publish
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
    uses: ./.github/workflows/cd-render-image.yml
    with:
      app: media
      gh_repository: ${{ github.repository }}
    secrets:
      RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_MEDIA_DEPLOY_HOOK }}
