name: CD Render IaC

on:
  workflow_call:
    inputs:
      apply:
        required: false
        type: boolean
        default: false
      use_github_sha_tag:
        required: false
        type: boolean
        default: false
      api_use_github_sha_tag:
        required: false
        type: boolean
        default: false
      web_use_github_sha_tag:
        required: false
        type: boolean
        default: false
      api_image_tag:
        required: false
        type: string
        default: ''
      web_image_tag:
        required: false
        type: string
        default: ''
      gh_repository:
        required: false
        type: string
        default: ''
      api_image_url:
        required: false
        type: string
        default: ''
      web_image_url:
        required: false
        type: string
        default: ''
      working_directory:
        required: false
        type: string
        default: infra/render
      terraform_version:
        required: false
        type: string
        default: 1.14.5
    secrets:
      RENDER_API_KEY:
        required: true
      RENDER_OWNER_ID:
        required: true
      TF_API_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform Render IaC
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working_directory }}
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_OWNER_ID: ${{ secrets.RENDER_OWNER_ID }}
      TF_CLOUD_ORGANIZATION: ${{ vars.TF_CLOUD_ORGANIZATION }}
      TF_WORKSPACE: ${{ vars.TF_WORKSPACE }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Check formatting
        run: terraform fmt -check -recursive

      - name: Init
        run: terraform init -input=false

      - name: Resolve image tags
        env:
          API_IMAGE_URL_INPUT: ${{ inputs.api_image_url }}
          API_IMAGE_TAG_INPUT: ${{ inputs.api_image_tag }}
          API_USE_GITHUB_SHA_TAG: ${{ inputs.api_use_github_sha_tag }}
          GH_REPOSITORY_INPUT: ${{ inputs.gh_repository }}
          USE_GITHUB_SHA_TAG: ${{ inputs.use_github_sha_tag }}
          WEB_IMAGE_URL_INPUT: ${{ inputs.web_image_url }}
          WEB_IMAGE_TAG_INPUT: ${{ inputs.web_image_tag }}
          WEB_USE_GITHUB_SHA_TAG: ${{ inputs.web_use_github_sha_tag }}
        run: |
          set -euo pipefail

          if [ -z "${TF_CLOUD_ORGANIZATION}" ]; then
            echo "Repository variable TF_CLOUD_ORGANIZATION is required." >&2
            exit 1
          fi

          if [ -z "${TF_WORKSPACE}" ]; then
            echo "Repository variable TF_WORKSPACE is required." >&2
            exit 1
          fi

          gh_repository="${GH_REPOSITORY_INPUT:-${GITHUB_REPOSITORY:-}}"
          if [ -z "${gh_repository}" ]; then
            echo "GitHub repository is required to resolve GHCR image URLs." >&2
            exit 1
          fi

          gh_repository="${gh_repository,,}"
          api_image_url="${API_IMAGE_URL_INPUT:-ghcr.io/${gh_repository}-api}"
          web_image_url="${WEB_IMAGE_URL_INPUT:-ghcr.io/${gh_repository}-web}"

          echo "TF_VAR_api_image_url=${api_image_url}" >> "${GITHUB_ENV}"
          echo "TF_VAR_web_image_url=${web_image_url}" >> "${GITHUB_ENV}"

          short_sha="${GITHUB_SHA:0:7}"

          read_current_tag() {
            local service_name="$1"

            terraform state pull | python3 -c 'import json, sys; service = sys.argv[1]; state = json.load(sys.stdin); print(next(((((instance.get("attributes", {}).get("runtime_source") or {}).get("image") or {}).get("tag")) for resource in state.get("resources", []) if resource.get("type") == "render_web_service" and resource.get("name") == service for instance in (resource.get("instances") or []) if (((instance.get("attributes", {}).get("runtime_source") or {}).get("image") or {}).get("tag"))), ""))' "${service_name}"
          }

          if [ "${USE_GITHUB_SHA_TAG}" = "true" ] || [ "${API_USE_GITHUB_SHA_TAG}" = "true" ]; then
            api_image_tag="sha-${short_sha}"
          else
            api_image_tag="${API_IMAGE_TAG_INPUT:-}"
            if [ -z "${api_image_tag}" ]; then
              api_image_tag="$(read_current_tag api)"
            fi
          fi

          if [ "${USE_GITHUB_SHA_TAG}" = "true" ] || [ "${WEB_USE_GITHUB_SHA_TAG}" = "true" ]; then
            web_image_tag="sha-${short_sha}"
          else
            web_image_tag="${WEB_IMAGE_TAG_INPUT:-}"
            if [ -z "${web_image_tag}" ]; then
              web_image_tag="$(read_current_tag web)"
            fi
          fi

          if [ -n "${api_image_tag}" ]; then
            echo "TF_VAR_api_image_tag=${api_image_tag}" >> "${GITHUB_ENV}"
          fi

          if [ -n "${web_image_tag}" ]; then
            echo "TF_VAR_web_image_tag=${web_image_tag}" >> "${GITHUB_ENV}"
          fi

      - name: Validate
        run: terraform validate -no-color

      - name: Apply
        if: inputs.apply
        run: terraform apply -input=false -auto-approve
