name: Web CI/CD Pipeline

on:
  push:
    branches: [master]
    paths:
      - 'apps/web/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate Web
    runs-on: ubuntu-latest
    steps:
      - name: Code (Checkout)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Environment
        uses: ./.github/actions/setup-environment

      - name: Turbo Cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-web-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-web-
            ${{ runner.os }}-turbo-

      - name: Check (Lint)
        run: pnpm --filter=web run lint

      - name: Check (Typecheck)
        run: pnpm --filter=web run typecheck

      - name: Security Scan (Audit)
        run: pnpm audit --audit-level high

      - name: Unit Test
        run: pnpm --filter=web run test

      - name: Build
        run: pnpm --filter=web run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_APP_ENV: production
          VITE_APP_VERSION: ${{ vars.APP_VERSION || '0.1.0' }}
          VITE_COMMIT_SHA: ${{ github.sha }}
          VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
          VITE_SENTRY_ENVIRONMENT: production
          VITE_SENTRY_RELEASE: sha-${{ github.sha }}
          VITE_SENTRY_TRACES_SAMPLE_RATE: ${{ vars.VITE_SENTRY_TRACES_SAMPLE_RATE || '0.1' }}
          VITE_POSTHOG_KEY: ${{ secrets.POSTHOG_WEB_KEY }}
          VITE_POSTHOG_HOST: ${{ vars.POSTHOG_WEB_HOST || 'https://app.posthog.com' }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_WEB_PROJECT }}

  publish:
    name: Publish Web Docker Image
    needs: validate
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/cd-package-docker.yml
    with:
      app: web
      gh_actor: ${{ github.actor }}
      gh_repository: ${{ github.repository }}
      vite_api_base_url: ${{ vars.VITE_API_BASE_URL }}
      vite_app_env: production
      vite_app_version: ${{ vars.APP_VERSION || '0.1.0' }}
      vite_commit_sha: ${{ github.sha }}
      vite_sentry_dsn: ${{ vars.VITE_SENTRY_DSN }}
      vite_sentry_environment: production
      vite_sentry_traces_sample_rate: ${{ vars.VITE_SENTRY_TRACES_SAMPLE_RATE || '0.1' }}
      vite_posthog_key: ${{ vars.POSTHOG_WEB_KEY }}
      vite_posthog_host: ${{ vars.POSTHOG_WEB_HOST || 'https://app.posthog.com' }}
    secrets: inherit

  apply-render-infra:
    name: Apply Web Image to Render
    needs: publish
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
    uses: ./.github/workflows/cd-render-iac.yml
    with:
      apply: true
      gh_repository: ${{ github.repository }}
      web_use_github_sha_tag: true
    secrets: inherit
