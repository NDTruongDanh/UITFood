name: Web CI/CD Pipeline

on:
  push:
    branches: [master]
    paths:
      - 'apps/web/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate Web
    runs-on: ubuntu-latest
    steps:
      - name: Code (Checkout)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Environment
        uses: ./.github/actions/setup-environment

      - name: Turbo Cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-web-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-web-
            ${{ runner.os }}-turbo-

      - name: Check (Lint & Typecheck)
        run: pnpm turbo run lint typecheck --filter=web --cache-dir=".turbo"
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Security Scan (Audit)
        run: pnpm audit --audit-level high

      - name: Unit Test
        run: pnpm turbo run test --filter=web --cache-dir=".turbo"
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Build
        run: pnpm turbo run build --filter=web --cache-dir=".turbo"
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_APP_ENV: production
          VITE_APP_VERSION: ${{ vars.APP_VERSION || '0.1.0' }}
          VITE_COMMIT_SHA: ${{ github.sha }}
          VITE_GRAFANA_FARO_COLLECTOR_URL: ${{ vars.VITE_GRAFANA_FARO_COLLECTOR_URL }}
          VITE_GRAFANA_FARO_APP_NAME: ${{ vars.VITE_GRAFANA_FARO_APP_NAME || 'uitfood-web' }}
          VITE_POSTHOG_KEY: ${{ secrets.POSTHOG_WEB_KEY }}
          VITE_POSTHOG_HOST: ${{ vars.POSTHOG_WEB_HOST || 'https://app.posthog.com' }}

  publish:
    name: Publish Web Docker Image
    needs: validate
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/cd-package-docker.yml
    with:
      app: web
      gh_actor: ${{ github.actor }}
      gh_repository: ${{ github.repository }}
      vite_api_base_url: ${{ vars.VITE_API_BASE_URL }}
      vite_app_env: production
      vite_app_version: ${{ vars.APP_VERSION || '0.1.0' }}
      vite_commit_sha: ${{ github.sha }}
      vite_grafana_faro_collector_url: ${{ vars.VITE_GRAFANA_FARO_COLLECTOR_URL }}
      vite_grafana_faro_app_name: ${{ vars.VITE_GRAFANA_FARO_APP_NAME }}
      grafana_faro_sourcemap_endpoint: ${{ vars.GRAFANA_FARO_SOURCEMAP_ENDPOINT }}
      grafana_faro_app_id: ${{ vars.GRAFANA_FARO_APP_ID }}
      grafana_cloud_stack_id: ${{ vars.GRAFANA_CLOUD_STACK_ID }}
      vite_posthog_host: ${{ vars.POSTHOG_WEB_HOST }}
    secrets: inherit

  deploy-render:
    name: Deploy Web Image to Render
    needs: publish
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
    uses: ./.github/workflows/cd-render-image.yml
    with:
      app: web
      gh_repository: ${{ github.repository }}
    secrets:
      RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_WEB_DEPLOY_HOOK }}
