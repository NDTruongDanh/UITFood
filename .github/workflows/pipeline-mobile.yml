name: Mobile CI/CD Pipeline

on:
  push:
    branches: [master]
    paths:
      - 'apps/mobile/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate Mobile
    runs-on: ubuntu-latest
    steps:
      - name: Code (Checkout)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Environment
        uses: ./.github/actions/setup-environment

      - name: Turbo Cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-mobile-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-mobile-
            ${{ runner.os }}-turbo-

      - name: Check (Lint)
        run: pnpm --filter=mobile run lint

      - name: Check (Typecheck)
        run: pnpm --filter=mobile run typecheck

      - name: Security Scan (Audit)
        run: pnpm audit --audit-level high

      - name: Unit Test
        run: pnpm --filter=mobile run test

      - name: Build
        run: pnpm --filter=mobile run build
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ vars.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_APP_ENV: production
          EXPO_PUBLIC_APP_VERSION: ${{ vars.APP_VERSION || '1.0.0' }}
          EXPO_PUBLIC_COMMIT_SHA: ${{ github.sha }}
          EXPO_PUBLIC_SENTRY_ENVIRONMENT: production
          EXPO_PUBLIC_SENTRY_RELEASE: sha-${{ github.sha }}
          EXPO_PUBLIC_SENTRY_TRACES_SAMPLE_RATE: ${{ vars.EXPO_PUBLIC_SENTRY_TRACES_SAMPLE_RATE || '0.1' }}

      - name: Upload Sentry Source Maps
        working-directory: apps/mobile
        shell: bash
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_MOBILE_PROJECT }}
          SENTRY_RELEASE: sha-${{ github.sha }}
        run: |
          if [[ -z "${SENTRY_AUTH_TOKEN}" || -z "${SENTRY_ORG}" || -z "${SENTRY_PROJECT}" ]]; then
            echo "Sentry mobile sourcemap upload skipped: missing Sentry CI configuration."
            exit 0
          fi
          pnpm exec sentry-cli releases new "${SENTRY_RELEASE}" || true
          pnpm exec sentry-cli sourcemaps upload dist --release "${SENTRY_RELEASE}" --rewrite
          pnpm exec sentry-cli releases finalize "${SENTRY_RELEASE}"

  publish:
    name: Publish Mobile Build
    needs: validate
    uses: ./.github/workflows/cd-package-mobile.yml
    secrets:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
