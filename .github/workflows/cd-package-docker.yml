name: CD Package Docker

on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string
      gh_actor:
        required: true
        type: string
      gh_repository:
        required: true
        type: string
      vite_api_base_url:
        required: false
        type: string
        default: ''
    outputs:
      image_url:
        description: Published GHCR image repository URL.
        value: ${{ jobs.publish.outputs.image_url }}
      image_tag:
        description: Published short-SHA image tag.
        value: ${{ jobs.publish.outputs.image_tag }}
      image_ref:
        description: Published image reference used by Render deploy hooks.
        value: ${{ jobs.publish.outputs.image_ref }}

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Package & Publish Docker (${{ inputs.app }})
    runs-on: ubuntu-latest
    outputs:
      image_url: ${{ steps.image.outputs.name }}
      image_tag: ${{ steps.image.outputs.tag }}
      image_ref: ${{ steps.image.outputs.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ inputs.gh_actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Resolve image name
        id: image
        shell: bash
        env:
          APP: ${{ inputs.app }}
          GH_REPOSITORY: ${{ inputs.gh_repository }}
        run: |
          set -euo pipefail
          image="ghcr.io/${GH_REPOSITORY,,}-${APP,,}"
          image_tag="sha-${GITHUB_SHA:0:7}"
          echo "name=${image}" >> "${GITHUB_OUTPUT}"
          echo "tag=${image_tag}" >> "${GITHUB_OUTPUT}"
          echo "ref=${image}@${image_tag}" >> "${GITHUB_OUTPUT}"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=sha,format=short

      - name: Build & Push
        if: inputs.app != 'web'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: apps/${{ inputs.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ inputs.app }}
          cache-to: type=gha,mode=max,scope=${{ inputs.app }}

      - name: Build & Push Web
        if: inputs.app == 'web'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: apps/${{ inputs.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ inputs.vite_api_base_url }}
          cache-from: type=gha,scope=${{ inputs.app }}
          cache-to: type=gha,mode=max,scope=${{ inputs.app }}
