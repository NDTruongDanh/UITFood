name: CD Package Docker

on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string
      gh_actor:
        required: true
        type: string
      gh_repository:
        required: true
        type: string
      vite_api_base_url:
        required: false
        type: string
        default: ''
      vite_app_env:
        required: false
        type: string
        default: 'production'
      vite_app_version:
        required: false
        type: string
        default: ''
      vite_commit_sha:
        required: false
        type: string
        default: ''
      vite_sentry_dsn:
        required: false
        type: string
        default: ''
      vite_sentry_environment:
        required: false
        type: string
        default: 'production'
      vite_sentry_traces_sample_rate:
        required: false
        type: string
        default: '0.1'
      vite_posthog_key:
        required: false
        type: string
        default: ''
      vite_posthog_host:
        required: false
        type: string
        default: 'https://app.posthog.com'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Package & Publish Docker (${{ inputs.app }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ inputs.gh_actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Resolve image name
        id: image
        shell: bash
        env:
          APP: ${{ inputs.app }}
          GH_REPOSITORY: ${{ inputs.gh_repository }}
        run: |
          set -euo pipefail
          image="ghcr.io/${GH_REPOSITORY,,}-${APP,,}"
          echo "name=${image}" >> "${GITHUB_OUTPUT}"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=sha,format=short

      - name: Build & Push
        if: inputs.app != 'web'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: apps/${{ inputs.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ inputs.app }}
          cache-to: type=gha,mode=max,scope=${{ inputs.app }}

      - name: Build & Push Web
        if: inputs.app == 'web'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: apps/${{ inputs.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ inputs.vite_api_base_url }}
            VITE_APP_ENV=${{ inputs.vite_app_env }}
            VITE_APP_VERSION=${{ inputs.vite_app_version }}
            VITE_COMMIT_SHA=${{ inputs.vite_commit_sha || github.sha }}
            VITE_SENTRY_DSN=${{ inputs.vite_sentry_dsn }}
            VITE_SENTRY_ENVIRONMENT=${{ inputs.vite_sentry_environment }}
            VITE_SENTRY_RELEASE=sha-${{ github.sha }}
            VITE_SENTRY_TRACES_SAMPLE_RATE=${{ inputs.vite_sentry_traces_sample_rate }}
            VITE_POSTHOG_KEY=${{ secrets.POSTHOG_WEB_KEY || inputs.vite_posthog_key }}
            VITE_POSTHOG_HOST=${{ inputs.vite_posthog_host }}
          cache-from: type=gha,scope=${{ inputs.app }}
          cache-to: type=gha,mode=max,scope=${{ inputs.app }}
