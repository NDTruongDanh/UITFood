name: CD Package Docker

on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string
      gh_actor:
        required: true
        type: string
      gh_repository:
        required: true
        type: string
      image_url:
        required: false
        type: string
        default: ''
      dockerfile_path:
        required: false
        type: string
        default: ''
      vite_api_base_url:
        required: false
        type: string
        default: ''
      vite_app_env:
        required: false
        type: string
        default: 'production'
      vite_app_version:
        required: false
        type: string
        default: ''
      vite_commit_sha:
        required: false
        type: string
        default: ''
      vite_grafana_faro_collector_url:
        required: false
        type: string
        default: ''
      vite_grafana_faro_app_name:
        required: false
        type: string
        default: 'uitfood-web'
      grafana_faro_sourcemap_endpoint:
        required: false
        type: string
        default: ''
      grafana_faro_app_id:
        required: false
        type: string
        default: ''
      grafana_cloud_stack_id:
        required: false
        type: string
        default: ''
      vite_posthog_key:
        required: false
        type: string
        default: ''
      vite_posthog_host:
        required: false
        type: string
        default: 'https://app.posthog.com'
    secrets:
      POSTHOG_WEB_KEY:
        required: false
      GRAFANA_FARO_SOURCEMAP_API_KEY:
        required: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Package & Publish Docker (${{ inputs.app }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ inputs.gh_actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Resolve image name
        id: image
        shell: bash
        env:
          APP: ${{ inputs.app }}
          GH_REPOSITORY: ${{ inputs.gh_repository }}
          IMAGE_URL_INPUT: ${{ inputs.image_url }}
        run: |
          set -euo pipefail

          if [ -n "${IMAGE_URL_INPUT}" ]; then
            image="${IMAGE_URL_INPUT}"
          else
            image="ghcr.io/${GH_REPOSITORY,,}-${APP,,}"
          fi

          echo "name=${image}" >> "${GITHUB_OUTPUT}"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=sha,format=short

      - name: Resolve Dockerfile
        id: dockerfile
        shell: bash
        env:
          APP: ${{ inputs.app }}
          DOCKERFILE_PATH_INPUT: ${{ inputs.dockerfile_path }}
        run: |
          set -euo pipefail
          if [ -n "${DOCKERFILE_PATH_INPUT}" ]; then
            path="${DOCKERFILE_PATH_INPUT}"
          else
            path="apps/${APP}/Dockerfile"
          fi
          echo "path=${path}" >> "${GITHUB_OUTPUT}"

      - name: Build & Push
        if: inputs.app != 'web' && inputs.app != 'admin'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ steps.dockerfile.outputs.path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ inputs.app }}
          cache-to: type=gha,mode=max,scope=${{ inputs.app }}

      - name: Build & Push Static Web App
        if: inputs.app == 'web' || inputs.app == 'admin'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ steps.dockerfile.outputs.path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ inputs.vite_api_base_url }}
            VITE_APP_ENV=${{ inputs.vite_app_env }}
            VITE_APP_VERSION=${{ inputs.vite_app_version }}
            VITE_COMMIT_SHA=${{ inputs.vite_commit_sha || github.sha }}
            VITE_GRAFANA_FARO_COLLECTOR_URL=${{ inputs.vite_grafana_faro_collector_url }}
            VITE_GRAFANA_FARO_APP_NAME=${{ inputs.vite_grafana_faro_app_name }}
            GRAFANA_FARO_SOURCEMAP_ENDPOINT=${{ inputs.grafana_faro_sourcemap_endpoint }}
            GRAFANA_FARO_APP_ID=${{ inputs.grafana_faro_app_id }}
            GRAFANA_CLOUD_STACK_ID=${{ inputs.grafana_cloud_stack_id }}
            VITE_POSTHOG_KEY=${{ secrets.POSTHOG_WEB_KEY || inputs.vite_posthog_key }}
            VITE_POSTHOG_HOST=${{ inputs.vite_posthog_host }}
          secrets: |
            grafana_faro_sourcemap_api_key=${{ secrets.GRAFANA_FARO_SOURCEMAP_API_KEY }}
          cache-from: type=gha,scope=${{ inputs.app }}
          cache-to: type=gha,mode=max,scope=${{ inputs.app }}
