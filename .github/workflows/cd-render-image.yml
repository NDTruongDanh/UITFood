name: CD Render Image Deploy

on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string
      gh_repository:
        required: true
        type: string
      image_url:
        required: false
        type: string
        default: ''
      image_tag:
        required: false
        type: string
        default: ''
    secrets:
      RENDER_DEPLOY_HOOK_URL:
        required: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy ${{ inputs.app }} Image to Render
    runs-on: ubuntu-latest
    steps:
      - name: Resolve image reference
        id: image
        shell: bash
        env:
          APP: ${{ inputs.app }}
          GH_REPOSITORY: ${{ inputs.gh_repository }}
          IMAGE_TAG_INPUT: ${{ inputs.image_tag }}
          IMAGE_URL_INPUT: ${{ inputs.image_url }}
        run: |
          set -euo pipefail

          if [ -n "${IMAGE_URL_INPUT}" ]; then
            image_url="${IMAGE_URL_INPUT}"
          else
            image_url="ghcr.io/${GH_REPOSITORY,,}-${APP,,}"
          fi

          if [ -n "${IMAGE_TAG_INPUT}" ]; then
            image_tag="${IMAGE_TAG_INPUT}"
          else
            image_tag="sha-${GITHUB_SHA:0:7}"
          fi

          image_ref="${image_url}:${image_tag}"

          echo "image_url=${image_url}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${image_tag}" >> "${GITHUB_OUTPUT}"
          echo "image_ref=${image_ref}" >> "${GITHUB_OUTPUT}"

      - name: Trigger Render deploy
        shell: bash
        env:
          IMAGE_REF: ${{ steps.image.outputs.image_ref }}
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          set -euo pipefail

          curl --fail-with-body --silent --show-error --get \
            --data-urlencode "imgURL=${IMAGE_REF}" \
            "${RENDER_DEPLOY_HOOK_URL}"

          {
            echo "### Render deploy"
            echo "- Image: \`${IMAGE_REF}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
