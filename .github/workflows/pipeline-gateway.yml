name: Gateway CI/CD Pipeline

on:
  push:
    branches: [master]
    paths:
      - 'apps/gateway/**'
      - 'packages/contracts/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate Gateway
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
    steps:
      - name: Code (Checkout)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Environment
        uses: ./.github/actions/setup-environment

      - name: Turbo Cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-gateway-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-gateway-
            ${{ runner.os }}-turbo-

      - name: Check (Lint & Typecheck)
        run: pnpm turbo run lint typecheck --filter=gateway --cache-dir=".turbo"
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Security Scan (Audit)
        run: pnpm audit --audit-level high

      - name: Build
        run: pnpm turbo run build --filter=gateway --cache-dir=".turbo"
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      # The gateway E2E boots the gateway against an in-process echo-upstream
      # stub, so it needs no Postgres/Redis/monolith.
      - name: Test (E2E)
        run: pnpm --filter=gateway run test:e2e

  publish:
    name: Publish Gateway Docker Image
    needs: validate
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/cd-package-docker.yml
    with:
      app: gateway
      gh_actor: ${{ github.actor }}
      gh_repository: ${{ github.repository }}
    secrets: inherit

  deploy-render:
    name: Deploy Gateway Image to Render
    needs: publish
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
    uses: ./.github/workflows/cd-render-image.yml
    with:
      app: gateway
      gh_repository: ${{ github.repository }}
    secrets:
      RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_GATEWAY_DEPLOY_HOOK }}
