name: Mobile CI/CD

on:
  push:
    branches: [master]
    paths:
      - 'apps/mobile/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate Mobile
    runs-on: ubuntu-latest
    steps:
      - name: Code (Checkout)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Environment
        uses: ./.github/actions/setup-environment

      - name: Turbo Cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-mobile-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-mobile-
            ${{ runner.os }}-turbo-

      - name: Check (Lint)
        run: pnpm --filter=mobile run lint

      - name: Check (Typecheck)
        run: pnpm --filter=mobile run typecheck

      - name: Security Scan (Audit)
        run: pnpm audit --audit-level high

      - name: Unit Test
        run: pnpm --filter=mobile run test

      - name: Build
        run: pnpm --filter=mobile run build

  publish:
    name: Publish Mobile Build
    needs: validate
    uses: ./.github/workflows/publish-mobile.yml
    secrets:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
