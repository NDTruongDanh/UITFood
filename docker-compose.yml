services:
  postgres:
    image: postgres:18
    container_name: food_order_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    ports:
      - '5432:5432'
    volumes:
      - food_order_db:/var/lib/postgresql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: food_order_redis
    ports:
      - '6379:6379'
    volumes:
      - food_order_redis:/data
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: food_order_otel_collector
    command: ['--config=/etc/otelcol-contrib/config.yaml']
    ports:
      - '4317:4317'
      - '4318:4318'
      - '13133:13133'
    volumes:
      - ./infra/otel-collector/local.yaml:/etc/otelcol-contrib/config.yaml:ro
    restart: unless-stopped

volumes:
  food_order_db:
    driver: local
  food_order_redis:
    driver: local
