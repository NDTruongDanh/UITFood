# Development docker-compose — starts all local services + app dev servers with hot reload.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build
#
#
# After changing package.json or pnpm-lock.yaml, rebuild and reset volumes:
#   docker compose -f docker-compose.dev.yml down -v
#   docker compose -f docker-compose.dev.yml up --build
#
# Access:
#   API   → http://localhost:3000
#   Web   → http://localhost:5173
#   Admin → http://localhost:5174

services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg18-trixie
    container_name: food_order_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-food_order}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foodordersecret}
      POSTGRES_DB: ${POSTGRES_DB:-food_order_db}
    ports:
      - '5432:5432'
    volumes:
      - food_order_db:/var/lib/postgresql
      - ./infra/postgres/init-test-db.sql:/docker-entrypoint-initdb.d/01-init-test-db.sql:ro
    healthcheck:
      # $$VAR is expanded by the container shell, not by Compose.
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: food_order_redis
    ports:
      - '6379:6379'
    volumes:
      - food_order_redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: food_order_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - food_order_rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: food_order_api_dev
    volumes:
      - .:/app
      # Named volumes shadow the bind-mount for node_modules so the
      # Docker-installed packages aren't overwritten by the host directory.
      - api_nm_root:/app/node_modules
      - api_nm_app:/app/apps/api/node_modules
    environment:
      # Override localhost references so the API reaches the compose services.
      DATABASE_URL: postgresql://uitfood_api:api_secret@postgres:5432/${POSTGRES_DB:-food_order_db}
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672${RABBITMQ_VHOST:+/}${RABBITMQ_VHOST:-}
      RABBITMQ_EXCHANGE: uitfood.domain-events
      MEDIA_TCP_HOST: media
      MEDIA_TCP_PORT: 4001
      MEDIA_RPC_REQUIRED: 'true'
      LEGACY_MEDIA_ROUTES_ENABLED: 'true'
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-https://ollama.com}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gpt-oss:20b}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      AI_SEARCH_EMBEDDING_BASE_URL: ${AI_SEARCH_EMBEDDING_BASE_URL:-http://host.docker.internal:11434}
      # Enable polling-based file watching for reliable hot-reload inside Docker
      # on macOS/Windows (Docker Desktop bind mounts don't emit inotify events).
      CHOKIDAR_USEPOLLING: 'true'
    ports:
      - '3000:3000'
    command: sh -c "pnpm --filter @uitfood/contracts build && pnpm --filter api run dev"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      media:
        condition: service_started
    restart: unless-stopped

  media:
    build:
      context: .
      dockerfile: apps/services/media/Dockerfile.dev
    container_name: food_order_media_dev
    volumes:
      - .:/app
      - media_nm_root:/app/node_modules
      - media_nm_app:/app/apps/services/media/node_modules
    environment:
      DATABASE_URL: postgresql://uitfood_media:media_secret@postgres:5432/uitfood_media
      MEDIA_TCP_PORT: 4001
      MEDIA_MANAGEMENT_PORT: 4002
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-STUB_CLOUD}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-STUB_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-STUB_SECRET}
      CHOKIDAR_USEPOLLING: 'true'
    command: sh -c "pnpm --filter @uitfood/contracts build && pnpm run db:migrate && pnpm run dev"
    ports:
      - '4001:4001'
      - '4002:4002'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile.dev
    container_name: food_order_gateway_dev
    volumes:
      - .:/app
      - gateway_nm_root:/app/node_modules
      - gateway_nm_app:/app/apps/gateway/node_modules
    environment:
      PORT: 8080
      MONOLITH_UPSTREAM_URL: http://api:3000
      MEDIA_ROUTES_ENABLED: 'true'
      MEDIA_TCP_HOST: media
      MEDIA_TCP_PORT: 4001
      CHOKIDAR_USEPOLLING: 'true'
    ports:
      - '8080:8080'
    command: sh -c "pnpm --filter @uitfood/contracts build && pnpm run dev"
    depends_on:
      - api
      - media
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: food_order_web_dev
    volumes:
      - .:/app
      - web_nm_root:/app/node_modules
      - web_nm_app:/app/apps/web/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    # VITE_API_BASE_URL stays at localhost:3000 — the browser talks to the
    # published host port, not the internal Docker network.
    ports:
      - '5173:5173'
    depends_on:
      - gateway
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile.dev
    container_name: food_order_admin_dev
    volumes:
      - .:/app
      - admin_nm_root:/app/node_modules
      - admin_nm_app:/app/apps/admin/node_modules
    ports:
      - '5174:5174'
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  food_order_db:
    driver: local
  food_order_redis:
    driver: local
  food_order_rabbitmq:
    driver: local
  api_nm_root:
  api_nm_app:
  web_nm_root:
  web_nm_app:
  admin_nm_root:
  admin_nm_app:
  media_nm_root:
  media_nm_app:
  gateway_nm_root:
  gateway_nm_app:
