# Development docker-compose - starts local infrastructure plus app dev servers.
#
# Usage:
#   docker compose up --build --watch
#   docker compose watch
#
# Backend services share the uitfoodms-backend-dev image. Web and admin share
# the uitfoodms-frontend-dev image. Dependencies are installed at image build
# time by the Dockerfiles under infra/docker.
#
# Access:
#   API Gateway -> http://localhost:8080
#   Web         -> http://localhost:5173
#   Admin       -> http://localhost:5174

x-backend-image: &backend-image
  image: uitfoodms-backend-dev
  build:
    context: .
    dockerfile: infra/docker/backend/Dockerfile.dev

x-backend-env: &backend-env
  CHOKIDAR_USEPOLLING: 'true'
  TSC_WATCHFILE: DynamicPriorityPolling
  TSC_WATCHDIRECTORY: DynamicPriorityPolling

x-backend-common: &backend-common
  <<: *backend-image
  restart: unless-stopped

x-watch-root-package: &watch-root-package
  action: rebuild
  path: ./package.json

x-watch-lockfile: &watch-lockfile
  action: rebuild
  path: ./pnpm-lock.yaml

x-watch-workspace: &watch-workspace
  action: rebuild
  path: ./pnpm-workspace.yaml

x-watch-backend-dockerfile: &watch-backend-dockerfile
  action: rebuild
  path: ./infra/docker/backend/Dockerfile.dev

x-watch-contracts: &watch-contracts
  action: rebuild
  path: ./packages/contracts

x-frontend-image: &frontend-image
  image: uitfoodms-frontend-dev
  build:
    context: .
    dockerfile: infra/docker/frontend/Dockerfile.dev

x-frontend-common: &frontend-common
  <<: *frontend-image
  restart: unless-stopped

x-watch-frontend-dockerfile: &watch-frontend-dockerfile
  action: rebuild
  path: ./infra/docker/frontend/Dockerfile.dev

services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg18-trixie
    container_name: uitfoodms_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-uitfoodms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uitfoodmssecret}
      POSTGRES_DB: ${POSTGRES_DB:-uitfoodms}
    ports:
      - '5432:5432'
    volumes:
      - uitfoodms_db:/var/lib/postgresql
      - ./infra/postgres/init-test-db.sql:/docker-entrypoint-initdb.d/01-init-test-db.sql:ro
      - ./infra/postgres/pg_hba.local.conf:/etc/postgresql/pg_hba.local.conf:ro
    command: ['postgres', '-c', 'hba_file=/etc/postgresql/pg_hba.local.conf']
    healthcheck:
      # $$VAR is expanded by the container shell, not by Compose.
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: uitfoodms_redis
    ports:
      - '6379:6379'
    volumes:
      - uitfoodms_redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning

  notification-redis:
    image: redis:7-alpine
    container_name: uitfoodms_notification_redis
    ports:
      - '6380:6379'
    volumes:
      - uitfoodms_notification_redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: uitfoodms_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - uitfoodms_rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  identity:
    <<: *backend-common
    container_name: uitfoodms_identity_dev
    working_dir: /app/apps/services/identity
    environment:
      <<: *backend-env
      DATABASE_URL: postgresql://uitfood_identity:identity_secret@postgres:5432/uitfood_identity
      IDENTITY_TCP_PORT: 4011
      IDENTITY_MANAGEMENT_PORT: 4012
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-a_very_long_secret_for_test_purposes_only_32_chars}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:8080}
    command: sh -c "pnpm run db:migrate && pnpm run dev"
    ports:
      - '4011:4011'
      - '4012:4012'
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./apps/services/identity/src
          target: /app/apps/services/identity/src
        - action: rebuild
          path: ./apps/services/identity/package.json
        - *watch-root-package
        - *watch-lockfile
        - *watch-workspace
        - *watch-backend-dockerfile
        - *watch-contracts
    restart: unless-stopped

  media:
    <<: *backend-common
    container_name: uitfoodms_media_dev
    working_dir: /app/apps/services/media
    environment:
      <<: *backend-env
      DATABASE_URL: postgresql://uitfood_media:media_secret@postgres:5432/uitfood_media
      MEDIA_TCP_PORT: 4001
      MEDIA_MANAGEMENT_PORT: 4002
      INTERNAL_AUTH_JWT_SECRET: ${INTERNAL_AUTH_JWT_SECRET:-internal_auth_secret_for_local_dev_only_32_chars}
      INTERNAL_AUTH_TRUSTED_ISSUERS: uitfood-gateway
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-STUB_CLOUD}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-STUB_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-STUB_SECRET}
    command: sh -c "pnpm run db:migrate && pnpm run dev"
    ports:
      - '4001:4001'
      - '4002:4002'
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./apps/services/media/src
          target: /app/apps/services/media/src
        - action: rebuild
          path: ./apps/services/media/package.json
        - *watch-root-package
        - *watch-lockfile
        - *watch-workspace
        - *watch-backend-dockerfile
        - *watch-contracts
    restart: unless-stopped

  notification:
    <<: *backend-common
    container_name: uitfoodms_notification_dev
    working_dir: /app/apps/services/notification
    environment:
      <<: *backend-env
      DATABASE_URL: postgresql://uitfood_notification:notification_secret@postgres:5432/uitfood_notification
      REDIS_URL: redis://notification-redis:6379
      REDIS_HOST: notification-redis
      REDIS_PORT: 6379
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672}
      RABBITMQ_EXCHANGE: uitfood.domain-events
      NOTIFICATION_TCP_PORT: 4021
      NOTIFICATION_MANAGEMENT_PORT: 4022
      IDENTITY_TCP_HOST: identity
      IDENTITY_TCP_PORT: 4011
      INTERNAL_AUTH_JWT_SECRET: ${INTERNAL_AUTH_JWT_SECRET:-internal_auth_secret_for_local_dev_only_32_chars}
      INTERNAL_AUTH_TRUSTED_ISSUERS: uitfood-gateway
      CORS_ORIGIN: http://localhost:5173,http://localhost:5174
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@soli.dev}
      FIREBASE_SERVICE_ACCOUNT_PATH: ${FIREBASE_SERVICE_ACCOUNT_PATH:-}
    command: sh -c "pnpm run db:migrate && pnpm run dev"
    ports:
      - '4021:4021'
      - '4022:4022'
    depends_on:
      postgres:
        condition: service_healthy
      notification-redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      identity:
        condition: service_started
    develop:
      watch:
        - action: sync
          path: ./apps/services/notification/src
          target: /app/apps/services/notification/src
        - action: rebuild
          path: ./apps/services/notification/package.json
        - *watch-root-package
        - *watch-lockfile
        - *watch-workspace
        - *watch-backend-dockerfile
        - *watch-contracts
    restart: unless-stopped

  catalog:
    <<: *backend-common
    container_name: uitfoodms_catalog_dev
    working_dir: /app/apps/services/catalog
    environment:
      <<: *backend-env
      DATABASE_URL: postgresql://uitfood_catalog:catalog_secret@postgres:5432/uitfood_catalog
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672}
      RABBITMQ_EXCHANGE: uitfood.domain-events
      CATALOG_TCP_PORT: 4031
      CATALOG_MANAGEMENT_PORT: 4032
      IDENTITY_TCP_HOST: identity
      IDENTITY_TCP_PORT: 4011
      MEDIA_TCP_HOST: media
      MEDIA_TCP_PORT: 4001
      INTERNAL_AUTH_JWT_SECRET: ${INTERNAL_AUTH_JWT_SECRET:-internal_auth_secret_for_local_dev_only_32_chars}
      INTERNAL_AUTH_TRUSTED_ISSUERS: uitfood-gateway
      INTERNAL_AUTH_JWT_ISSUER: uitfood-catalog
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-https://ollama.com}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      AI_SEARCH_ENABLED: ${AI_SEARCH_ENABLED:-false}
      AI_SEARCH_EMBEDDING_WORKER_ENABLED: ${AI_SEARCH_EMBEDDING_WORKER_ENABLED:-false}
    command: sh -c "pnpm run db:migrate && pnpm run dev"
    ports:
      - '4031:4031'
      - '4032:4032'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      identity:
        condition: service_started
      media:
        condition: service_started
    develop:
      watch:
        - action: sync
          path: ./apps/services/catalog/src
          target: /app/apps/services/catalog/src
        - action: rebuild
          path: ./apps/services/catalog/package.json
        - *watch-root-package
        - *watch-lockfile
        - *watch-workspace
        - *watch-backend-dockerfile
        - *watch-contracts
    restart: unless-stopped

  promotion:
    <<: *backend-common
    container_name: uitfoodms_promotion_dev
    working_dir: /app/apps/services/promotion
    environment:
      <<: *backend-env
      DATABASE_URL: postgresql://uitfood_promotion:promotion_secret@postgres:5432/uitfood_promotion
      PROMOTION_TCP_PORT: 4041
      PROMOTION_MANAGEMENT_PORT: 4042
      INTERNAL_AUTH_JWT_SECRET: ${INTERNAL_AUTH_JWT_SECRET:-internal_auth_secret_for_local_dev_only_32_chars}
      INTERNAL_AUTH_TRUSTED_ISSUERS: uitfood-gateway,uitfood-ordering
      INTERNAL_AUTH_JWT_ISSUER: uitfood-promotion
    command: sh -c "pnpm run db:migrate && pnpm run dev"
    ports:
      - '4041:4041'
      - '4042:4042'
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./apps/services/promotion/src
          target: /app/apps/services/promotion/src
        - action: rebuild
          path: ./apps/services/promotion/package.json
        - *watch-root-package
        - *watch-lockfile
        - *watch-workspace
        - *watch-backend-dockerfile
        - *watch-contracts
    restart: unless-stopped

  payment:
    <<: *backend-common
    container_name: uitfoodms_payment_dev
    working_dir: /app/apps/services/payment
    environment:
      <<: *backend-env
      DATABASE_URL: postgresql://uitfood_payment:payment_secret@postgres:5432/uitfood_payment
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672}
      RABBITMQ_EXCHANGE: uitfood.domain-events
      PAYMENT_TCP_PORT: 4051
      PAYMENT_MANAGEMENT_PORT: 4052
      INTERNAL_AUTH_JWT_SECRET: ${INTERNAL_AUTH_JWT_SECRET:-internal_auth_secret_for_local_dev_only_32_chars}
      INTERNAL_AUTH_TRUSTED_ISSUERS: uitfood-gateway,uitfood-ordering
      INTERNAL_AUTH_JWT_ISSUER: uitfood-payment
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE:-STUB_TMN}
      VNPAY_HASH_SECRET: ${VNPAY_HASH_SECRET:-STUB_SECRET}
      VNPAY_URL: ${VNPAY_URL:-https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      VNPAY_RETURN_URL: ${VNPAY_RETURN_URL:-http://localhost:8080/api/payments/vnpay/return}
      MOBILE_PAYMENT_RETURN_URL: ${MOBILE_PAYMENT_RETURN_URL:-uitfood://payment/vnpay-return}
      PAYMENT_SESSION_TIMEOUT_SECONDS: ${PAYMENT_SESSION_TIMEOUT_SECONDS:-1800}
      VNPAY_REFUND_ENABLED: ${VNPAY_REFUND_ENABLED:-false}
      VNPAY_API_URL: ${VNPAY_API_URL:-https://sandbox.vnpayment.vn/merchant_webapi/api/transaction}
      VNPAY_REFUND_MAX_RETRIES: ${VNPAY_REFUND_MAX_RETRIES:-5}
    command: sh -c "pnpm run db:migrate && pnpm run dev"
    ports:
      - '4051:4051'
      - '4052:4052'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./apps/services/payment/src
          target: /app/apps/services/payment/src
        - action: rebuild
          path: ./apps/services/payment/package.json
        - *watch-root-package
        - *watch-lockfile
        - *watch-workspace
        - *watch-backend-dockerfile
        - *watch-contracts
    restart: unless-stopped

  ordering:
    <<: *backend-common
    container_name: uitfoodms_ordering_dev
    working_dir: /app/apps/services/ordering
    environment:
      <<: *backend-env
      DATABASE_URL: postgresql://uitfood_ordering:ordering_secret@postgres:5432/uitfood_ordering
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672}
      RABBITMQ_EXCHANGE: uitfood.domain-events
      ORDERING_TCP_PORT: 4071
      ORDERING_MANAGEMENT_PORT: 4072
      PROMOTION_TCP_HOST: promotion
      PROMOTION_TCP_PORT: 4041
      PROMOTION_RPC_REQUIRED: 'true'
      PAYMENT_TCP_HOST: payment
      PAYMENT_TCP_PORT: 4051
      PAYMENT_RPC_REQUIRED: 'true'
      IDENTITY_TCP_HOST: identity
      IDENTITY_TCP_PORT: 4011
      IDENTITY_RPC_REQUIRED: 'true'
      INTERNAL_AUTH_JWT_SECRET: ${INTERNAL_AUTH_JWT_SECRET:-internal_auth_secret_for_local_dev_only_32_chars}
      INTERNAL_AUTH_TRUSTED_ISSUERS: uitfood-gateway,uitfood-review
      INTERNAL_AUTH_JWT_ISSUER: uitfood-ordering
    command: sh -c "pnpm run db:migrate && pnpm run dev"
    ports:
      - '4071:4071'
      - '4072:4072'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      promotion:
        condition: service_started
      payment:
        condition: service_started
      identity:
        condition: service_started
    develop:
      watch:
        - action: sync
          path: ./apps/services/ordering/src
          target: /app/apps/services/ordering/src
        - action: rebuild
          path: ./apps/services/ordering/package.json
        - *watch-root-package
        - *watch-lockfile
        - *watch-workspace
        - *watch-backend-dockerfile
        - *watch-contracts
    restart: unless-stopped

  review:
    <<: *backend-common
    container_name: uitfoodms_review_dev
    working_dir: /app/apps/services/review
    environment:
      <<: *backend-env
      DATABASE_URL: postgresql://uitfood_review:review_secret@postgres:5432/uitfood_review
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672}
      RABBITMQ_EXCHANGE: uitfood.domain-events
      REVIEW_TCP_PORT: 4061
      REVIEW_MANAGEMENT_PORT: 4062
      ORDERING_TCP_HOST: ordering
      ORDERING_TCP_PORT: 4071
      INTERNAL_AUTH_JWT_SECRET: ${INTERNAL_AUTH_JWT_SECRET:-internal_auth_secret_for_local_dev_only_32_chars}
      INTERNAL_AUTH_TRUSTED_ISSUERS: uitfood-gateway
      INTERNAL_AUTH_JWT_ISSUER: uitfood-review
    command: sh -c "pnpm run db:migrate && pnpm run dev"
    ports:
      - '4061:4061'
      - '4062:4062'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      ordering:
        condition: service_started
    develop:
      watch:
        - action: sync
          path: ./apps/services/review/src
          target: /app/apps/services/review/src
        - action: rebuild
          path: ./apps/services/review/package.json
        - *watch-root-package
        - *watch-lockfile
        - *watch-workspace
        - *watch-backend-dockerfile
        - *watch-contracts
    restart: unless-stopped

  reporting:
    <<: *backend-common
    container_name: uitfoodms_reporting_dev
    working_dir: /app/apps/services/reporting
    environment:
      <<: *backend-env
      DATABASE_URL: postgresql://uitfood_reporting:reporting_secret@postgres:5432/uitfood_reporting
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672}
      RABBITMQ_EXCHANGE: uitfood.domain-events
      REPORTING_TCP_PORT: 4081
      REPORTING_MANAGEMENT_PORT: 4082
      INTERNAL_AUTH_JWT_SECRET: ${INTERNAL_AUTH_JWT_SECRET:-internal_auth_secret_for_local_dev_only_32_chars}
      INTERNAL_AUTH_TRUSTED_ISSUERS: uitfood-gateway
      INTERNAL_AUTH_JWT_ISSUER: uitfood-reporting
    command: sh -c "pnpm run db:migrate && pnpm run dev"
    ports:
      - '4081:4081'
      - '4082:4082'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./apps/services/reporting/src
          target: /app/apps/services/reporting/src
        - action: rebuild
          path: ./apps/services/reporting/package.json
        - *watch-root-package
        - *watch-lockfile
        - *watch-workspace
        - *watch-backend-dockerfile
        - *watch-contracts
    restart: unless-stopped

  gateway:
    <<: *backend-common
    container_name: uitfoodms_gateway_dev
    working_dir: /app/apps/gateway
    environment:
      <<: *backend-env
      PORT: 8080
      MEDIA_ROUTES_ENABLED: 'true'
      MEDIA_TCP_HOST: media
      MEDIA_TCP_PORT: 4001
      MEDIA_MANAGEMENT_PORT: 4002
      IDENTITY_ROUTES_ENABLED: 'true'
      IDENTITY_TCP_HOST: identity
      IDENTITY_TCP_PORT: 4011
      IDENTITY_MANAGEMENT_PORT: 4012
      NOTIFICATION_ROUTES_ENABLED: 'true'
      NOTIFICATION_TCP_HOST: notification
      NOTIFICATION_TCP_PORT: 4021
      NOTIFICATION_MANAGEMENT_PORT: 4022
      CATALOG_ROUTES_ENABLED: 'true'
      CATALOG_TCP_HOST: catalog
      CATALOG_TCP_PORT: 4031
      CATALOG_MANAGEMENT_PORT: 4032
      PROMOTION_ROUTES_ENABLED: 'true'
      PROMOTION_TCP_HOST: promotion
      PROMOTION_TCP_PORT: 4041
      PROMOTION_MANAGEMENT_PORT: 4042
      PAYMENT_ROUTES_ENABLED: 'true'
      PAYMENT_TCP_HOST: payment
      PAYMENT_TCP_PORT: 4051
      PAYMENT_MANAGEMENT_PORT: 4052
      REVIEW_ROUTES_ENABLED: 'true'
      REVIEW_TCP_HOST: review
      REVIEW_TCP_PORT: 4061
      REVIEW_MANAGEMENT_PORT: 4062
      ORDERING_ROUTES_ENABLED: 'true'
      ORDERING_TCP_HOST: ordering
      ORDERING_TCP_PORT: 4071
      ORDERING_MANAGEMENT_PORT: 4072
      REPORTING_ROUTES_ENABLED: 'true'
      REPORTING_TCP_HOST: reporting
      REPORTING_TCP_PORT: 4081
      REPORTING_MANAGEMENT_PORT: 4082
      INTERNAL_AUTH_JWT_SECRET: ${INTERNAL_AUTH_JWT_SECRET:-internal_auth_secret_for_local_dev_only_32_chars}
      INTERNAL_AUTH_JWT_ISSUER: uitfood-gateway
    ports:
      - '8080:8080'
    command: sh -c "pnpm run dev"
    depends_on:
      media:
        condition: service_started
      identity:
        condition: service_started
      notification:
        condition: service_started
      catalog:
        condition: service_started
      promotion:
        condition: service_started
      payment:
        condition: service_started
      review:
        condition: service_started
      ordering:
        condition: service_started
      reporting:
        condition: service_started
    develop:
      watch:
        - action: sync
          path: ./apps/gateway/src
          target: /app/apps/gateway/src
        - action: rebuild
          path: ./apps/gateway/package.json
        - *watch-root-package
        - *watch-lockfile
        - *watch-workspace
        - *watch-backend-dockerfile
        - *watch-contracts
    restart: unless-stopped

  web:
    <<: *frontend-common
    container_name: uitfoodms_web_dev
    working_dir: /app/apps/web
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    # VITE_API_BASE_URL stays at localhost:8080 because the browser talks to the
    # published host port, not the internal Docker network.
    ports:
      - '5173:5173'
    command: pnpm run dev
    depends_on:
      - gateway
    develop:
      watch:
        - action: sync
          path: ./apps/web
          target: /app/apps/web
          ignore:
            - node_modules/
            - dist/
            - package.json
        - action: rebuild
          path: ./apps/web/package.json
        - *watch-root-package
        - *watch-lockfile
        - *watch-workspace
        - *watch-frontend-dockerfile

  admin:
    <<: *frontend-common
    container_name: uitfoodms_admin_dev
    working_dir: /app/apps/admin
    ports:
      - '5174:5174'
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    command: pnpm run dev
    depends_on:
      - gateway
    develop:
      watch:
        - action: sync
          path: ./apps/admin
          target: /app/apps/admin
          ignore:
            - node_modules/
            - dist/
            - package.json
        - action: rebuild
          path: ./apps/admin/package.json
        - *watch-root-package
        - *watch-lockfile
        - *watch-workspace
        - *watch-frontend-dockerfile

volumes:
  uitfoodms_db:
    driver: local
  uitfoodms_redis:
    driver: local
  uitfoodms_notification_redis:
    driver: local
  uitfoodms_rabbitmq:
    driver: local
